<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackBox Lab | Início</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar - mesma cor do fundo */
        .navbar {
            background-color: #000000;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 1px solid #333;
            position: relative;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
        }

        /* Botão Hamburguer */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            background: transparent;
            border: none;
            padding: 0.5rem;
            z-index: 100;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background-color: #ffffff;
            margin: 3px 0;
            transition: 0.3s;
            border-radius: 2px;
        }

        /* Menu container */
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.3s ease;
            padding: 0.5rem 1rem;
            border-radius: 5px;
        }

        .nav-links a:hover {
            color: #cccccc;
            background-color: #1a1a1a;
        }

        /* Conteúdo principal - centralizado */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background-color: #000000;
        }

        .image-container {
            text-align: center;
            max-width: 90%;
        }

        .central-image {
            max-width: 100%;
            height: auto;
            max-height: 70vh;
        }

        /* Footer */
        .footer {
            background-color: #000000;
            padding: 2rem;
            text-align: center;
            border-top: 1px solid #333;
        }

        .footer p {
            margin: 0.5rem 0;
            color: #888;
        }

        .footer a {
            color: #ffffff;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: #cccccc;
            text-decoration: underline;
        }

        .social-links {
            margin: 1rem 0;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .social-links a {
            color: #888;
            font-size: 0.9rem;
        }

        .social-links a:hover {
            color: #ffffff;
        }

        /* Responsividade - Menu Hamburguer */
        @media (max-width: 768px) {
            .navbar {
                padding: 1rem;
            }

            .hamburger {
                display: flex;
            }

            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 250px;
                height: 100vh;
                background-color: #000000;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                transition: 0.3s ease;
                gap: 2rem;
                z-index: 99;
                border-left: 1px solid #333;
            }

            .nav-links.active {
                right: 0;
            }

            .nav-links li {
                margin: 1rem 0;
            }

            .nav-links a {
                font-size: 1.2rem;
                padding: 0.8rem 1.5rem;
            }

            /* Animação do hamburguer para X */
            .hamburger.active span:nth-child(1) {
                transform: rotate(45deg) translate(5px, 5px);
            }

            .hamburger.active span:nth-child(2) {
                opacity: 0;
            }

            .hamburger.active span:nth-child(3) {
                transform: rotate(-45deg) translate(7px, -6px);
            }

            .central-image {
                max-height: 50vh;
            }

            .footer {
                padding: 1.5rem;
            }
        }

        /* Overlay escuro quando menu aberto */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 98;
        }

        .overlay.active {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Overlay para fechar o menu ao clicar fora -->
    <div class="overlay" id="overlay"></div>

    <!-- Navbar com menu hamburguer -->
    <nav class="navbar">
        <a href="/" class="logo">BlackBox Lab</a>
        
        <!-- Botão Hamburguer -->
        <button class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <!-- Menu (apenas Jellyfin) -->
        <ul class="nav-links" id="navLinks">
            <li><a href="https://jellyfin.blackboxlab.com.br" target="_blank" rel="noopener noreferrer">Jellyfin</a></li>
        </ul>
    </nav>

    <!-- Conteúdo principal com imagem centralizada -->
    <main class="main-content">
        <div class="image-container">
            <img src="static/box.png" alt="BlackBox Lab - Conteúdo" class="central-image">
        </div>
    </main>

    <!-- Footer com informações de contato -->
    <footer class="footer">
        <p>© 2026 BlackBox Lab. Todos os direitos reservados.</p>
    </footer>

    <!-- JavaScript para controlar o menu hamburguer -->
    <script>
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');
        const overlay = document.getElementById('overlay');

        function toggleMenu() {
            hamburger.classList.toggle('active');
            navLinks.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        function closeMenu() {
            hamburger.classList.remove('active');
            navLinks.classList.remove('active');
            overlay.classList.remove('active');
        }

        hamburger.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', closeMenu);

        // Fecha o menu se a tela for redimensionada para desktop
        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                closeMenu();
            }
        });
    </script>
</body>
</html>
